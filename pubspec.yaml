name: forest_carbon_platform
description: "Forest Carbon Platform - Quản lý dữ liệu rừng phục vụ dự án carbon"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase ──────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # ── Map ───────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Storage / Media ───────────────────────────────
  cloudinary_public: ^0.23.1
  image_picker: ^1.1.2
  file_picker: ^8.3.7

  # ── Offline ───────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Navigation ────────────────────────────────────
  go_router: ^14.6.3

  # ── Charts ────────────────────────────────────────
  fl_chart: ^0.70.2

  # ── PDF ───────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.14.2

  # ── Location ──────────────────────────────────────
  geolocator: ^13.0.2

  # ── Utils ─────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.4
  flutter_image_compress: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
